        const AUTO_DB_FILENAMES = [

        const normalizeText = (value) => String(value ?? '').trim();
        const normalizeHeader = (value) => normalizeText(value).toLowerCase().replace(/[^a-z0-9]/g, '');
        const normalizeStatus = (value) => {
            const raw = normalizeText(value);
            const s = raw.toLowerCase();
            if (s.includes('staff')) return 'Staff';
            if (s.includes('worker') || s.includes('operator') || s.includes('karyawan')) return 'Worker';
            return raw || 'Worker';
        };
        const normalizeJam = (value) => {
            const text = normalizeText(value).replace(',', '.');
            const num = parseFloat(text);
            if (!Number.isFinite(num) || num <= 0) return '';
            return String(num);
        };
        const pad2 = (n) => String(n).padStart(2, '0');
        const normalizeDateValue = (value, fallbackDate = '') => {
            if (value instanceof Date && !isNaN(value)) {
                return `${value.getFullYear()}-${pad2(value.getMonth() + 1)}-${pad2(value.getDate())}`;
            }
            const text = normalizeText(value);
            if (/^\d{4}-\d{2}-\d{2}$/.test(text)) return text;
            const m = text.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})$/);
            if (m) {
                let d = parseInt(m[1], 10);
                let mo = parseInt(m[2], 10);
                let y = parseInt(m[3], 10);
                if (y < 100) y += 2000;
                // Format lokal Indonesia lebih sering dd/mm/yyyy.
                if (mo > 12 && d <= 12) { const tmp = d; d = mo; mo = tmp; }
                return `${y}-${pad2(mo)}-${pad2(d)}`;
            }
            const dt = new Date(text);
            if (!isNaN(dt)) return dt.toISOString().split('T')[0];
            return fallbackDate || new Date().toISOString().split('T')[0];
        };
        const isHolidayDate = (dateStr) => {
            const d = new Date(dateStr);
            if (isNaN(d)) return false;
            const day = d.getDay();
            return day === 0 || day === 6;
        };
        const buildOvertimeCode = (jam, userStatus, isLibur) => {
            const safeJam = normalizeJam(jam);
            if (!safeJam || !userStatus) return '';
            const statusUpper = normalizeStatus(userStatus).toUpperCase();
            if (statusUpper === 'WORKER') return isLibur ? `L${safeJam}` : `K${safeJam}`;
            return `K${safeJam}`;
        };

        const DB_HEADER_ALIASES = {
            id: ['id', 'nik', 'nip', 'no', 'nomor', 'noid', 'nokaryawan', 'karyawanid', 'idkaryawan', 'employeeid', 'empid', 'payroll', 'badge', 'pin', 'userid', 'nrp'],
            nama: ['nama', 'name', 'namakaryawan', 'fullnama', 'fullname', 'employeename', 'karyawan'],
            section: ['section', 'bagian', 'departemen', 'department', 'dept', 'seksi', 'line', 'unit', 'divisi', 'area'],
            status: ['status', 'jabatan', 'kategori', 'type', 'tipe', 'golongan', 'grade', 'level', 'workerstaff']
        };
        const REPORT_HEADER_ALIASES = {
            tanggal: ['tanggal', 'date', 'tgl'],
            penginput: ['inputter', 'penginput', 'user', 'pic', 'dibuatoleh', 'createdby'],
            karyawanId: ['id', 'nik', 'nip', 'karyawanid', 'idkaryawan', 'employeeid', 'empid'],
            nama: ['nama', 'name', 'namakaryawan', 'fullname', 'employeename'],

            shift: ['shift']
        };
        const allAliases = (aliasesMap) => Object.values(aliasesMap).flat().map(normalizeHeader);
        const findHeaderRow = (rows, aliasesMap, minScore = 2) => {
            const aliases = allAliases(aliasesMap);
            const limit = Math.min(rows.length, 10);
            for (let i = 0; i < limit; i++) {
                const row = rows[i] || [];
                const score = row.map(normalizeHeader).filter(cell => aliases.includes(cell)).length;
                if (score >= minScore) return i;
            }
            return -1;
        };
        const getColumnIndex = (headerRow, aliases, fallback) => {
            const headers = (headerRow || []).map(normalizeHeader);
            for (const alias of aliases) {
                const idx = headers.indexOf(normalizeHeader(alias));
                if (idx !== -1) return idx;
            }
            return fallback;
        };
        const getFirstSheetRows = (wb) => {
            if (!wb || !wb.SheetNames || !wb.SheetNames.length) return [];
            const ws = wb.Sheets[wb.SheetNames[0]];
            return window.XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, blankrows: false, defval: '' });
        };
        const parseDatabaseWorkbook = (wb) => {
            const rows = getFirstSheetRows(wb);
            if (!rows.length) return [];
            const headerIndex = findHeaderRow(rows, DB_HEADER_ALIASES, 2);
            const headerRow = headerIndex >= 0 ? rows[headerIndex] : [];
            const col = {
                id: headerIndex >= 0 ? getColumnIndex(headerRow, DB_HEADER_ALIASES.id, 0) : 0,
                nama: headerIndex >= 0 ? getColumnIndex(headerRow, DB_HEADER_ALIASES.nama, 1) : 1,
                section: headerIndex >= 0 ? getColumnIndex(headerRow, DB_HEADER_ALIASES.section, 2) : 2,
                status: headerIndex >= 0 ? getColumnIndex(headerRow, DB_HEADER_ALIASES.status, 3) : 3
            };
            const start = headerIndex >= 0 ? headerIndex + 1 : 0;
            const result = [];
            const seen = new Set();
            for (let i = start; i < rows.length; i++) {
                const row = rows[i] || [];
                const id = normalizeText(row[col.id]);
                const nama = normalizeText(row[col.nama]);
                if (!id || !nama) continue;
                if (normalizeHeader(id) === 'id' || normalizeHeader(nama) === 'nama') continue;
                if (seen.has(id)) continue;
                seen.add(id);
                result.push({ id, nama, section: normalizeText(row[col.section]) || '-', status: normalizeStatus(row[col.status]) });
            }
            return result;
        };
        const parseReportWorkbook = (wb, fallbackDate = '') => {
            const rows = getFirstSheetRows(wb);
            if (!rows.length) return [];
            const headerIndex = findHeaderRow(rows, REPORT_HEADER_ALIASES, 3);
            const headerRow = headerIndex >= 0 ? rows[headerIndex] : [];
            const col = {
                tanggal: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.tanggal, 0) : 0,
                penginput: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.penginput, 1) : 1,
                karyawanId: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.karyawanId, 2) : 2,
                nama: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.nama, 3) : 3,
                section: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.section, 4) : 4,
                status: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.status, 5) : 5,
                jam: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.jam, 6) : 6,
                kode: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.kode, 7) : 7,
                pinjam: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.pinjam, 8) : 8,
                shift: headerIndex >= 0 ? getColumnIndex(headerRow, REPORT_HEADER_ALIASES.shift, 9) : 9
            };
            const start = headerIndex >= 0 ? headerIndex + 1 : 0;
            const result = [];
            const seen = new Set();
            for (let i = start; i < rows.length; i++) {
                const row = rows[i] || [];
                const tanggal = normalizeDateValue(row[col.tanggal], fallbackDate);
                const karyawanId = normalizeText(row[col.karyawanId]);
                const nama = normalizeText(row[col.nama]);
                const jam = normalizeJam(row[col.jam]);
                if (!tanggal || (!karyawanId && !nama) || !jam) continue;
                const status = normalizeStatus(row[col.status]);
                const kode = normalizeText(row[col.kode]) || buildOvertimeCode(jam, status, isHolidayDate(tanggal));
                const item = {
                    id: generateUniqueId(),
                    tanggal,
                    penginput: normalizeText(row[col.penginput]) || '-',
                    karyawanId: karyawanId || `NOID-${i + 1}`,
                    nama,
                    section: normalizeText(row[col.section]) || '-',
                    status,
                    jam,
                    kode,
                    pinjam: normalizeText(row[col.pinjam]) || '-',
                    shift: normalizeText(row[col.shift]) || (isHolidayDate(tanggal) ? 'Pagi' : '')
                };
                const key = `${item.tanggal}|${item.karyawanId}|${item.jam}|${item.kode}|${item.shift}`;
                if (seen.has(key)) continue;
                seen.add(key);
                result.push(item);
            }
            return result;
        };
        const readWorkbookFromFile = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const wb = window.XLSX.read(evt.target.result, { type: 'array' });

                } catch (err) { reject(err); }
            };
            reader.onerror = reject;
            reader.readAsArrayBuffer(file);
        });
        const makeReportKey = (item) => `${item.tanggal}|${item.karyawanId}|${item.jam}|${item.kode}|${item.shift || ''}`;

        const FEEDBACK_STYLES = {

        };

        // --- APP COMPONENT ---
        const App = () => {
            // STATE
            const [dbKaryawan, setDbKaryawan] = useState(() => {
                try {
                    const saved = localStorage.getItem('dbKaryawan_v2');
                    return saved ? JSON.parse(saved) : DEFAULT_DATABASE;
                } catch { return DEFAULT_DATABASE; }
            });

            const [dbLoadInfo, setDbLoadInfo] = useState('Memuat database otomatis...');

            const [inputDate, setInputDate] = useState(new Date().toISOString().split('T')[0]);
            const [isHoliday, setIsHoliday] = useState(false);
            const [namaPenginput, setNamaPenginput] = useState('');

            const [queueLembur, setQueueLembur] = useState([]);
            const [dataLembur, setDataLembur] = useState(() => {
                try {
                    const saved = localStorage.getItem('dataLembur_temp');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });

            const [toast, setToast] = useState(null);
            const [dialog, setDialog] = useState(null);
            const [editingItem, setEditingItem] = useState(null);

            const [searchReport, setSearchReport] = useState('');
            const [filterReportSection, setFilterReportSection] = useState('All');
            const [showDbModal, setShowDbModal] = useState(false);
            const [searchDb, setSearchDb] = useState('');
            const [filterSection, setFilterSection] = useState('All');
            const [selectedDbIds, setSelectedDbIds] = useState(new Set());
            const [viewSelectedOnly, setViewSelectedOnly] = useState(false); // NEW: State untuk toggle view selected
            
            // Batch State
            const [batchJam, setBatchJam] = useState('');
            const [batchPinjam, setBatchPinjam] = useState(''); 
            const [batchShift, setBatchShift] = useState('Pagi'); 

            // Refs
            const batchJamInputRef = useRef(null); 
            const searchInputRef = useRef(null); 
            const batchSubmitLockRef = useRef(false);
            const toastTimerRef = useRef(null);
            const dialogResolverRef = useRef(null);

            const showToast = useCallback((message, type = 'success', duration = 3000) => {
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                setToast({ id: generateUniqueId(), message, type });
                toastTimerRef.current = setTimeout(() => setToast(null), duration);
            }, []);

            const showAlert = useCallback((message, options = {}) => {
                return new Promise(resolve => {
                    dialogResolverRef.current = resolve;
                    setDialog({
                        mode: 'alert',
                        type: options.type || 'warning',
                        title: options.title || 'Perhatian',
                        message,
                        confirmText: options.confirmText || 'Mengerti'
                    });
                });
            }, []);

            const showConfirm = useCallback((message, options = {}) => {
                return new Promise(resolve => {
                    dialogResolverRef.current = resolve;
                    setDialog({
                        mode: 'confirm',
                        type: options.type || 'warning',
                        title: options.title || 'Konfirmasi',
                        message,
                        confirmText: options.confirmText || 'Ya, Lanjutkan',
                        cancelText: options.cancelText || 'Batal'
                    });
                });
            }, []);

            const closeDialog = useCallback((result) => {
                const resolve = dialogResolverRef.current;
                dialogResolverRef.current = null;
                setDialog(null);
                if (resolve) resolve(result);
            }, []);

            const focusPenginput = () => {
                setTimeout(() => {
                    const inputEl = document.getElementById('inputNamaPenginput');
                    if (inputEl) inputEl.focus();
                }, 100);
            };

            // EFFECTS
            useEffect(() => {
                if (!dialog) return;
                const onKeyDown = (e) => {
                    if (e.key === 'Escape') closeDialog(false);
                    if (e.key === 'Enter') closeDialog(true);
                };
                window.addEventListener('keydown', onKeyDown);
                return () => window.removeEventListener('keydown', onKeyDown);
            }, [dialog, closeDialog]);

            useEffect(() => {
                try {
                    localStorage.setItem('dataLembur_temp', JSON.stringify(dataLembur));
                } catch (err) {
                    console.warn('Gagal menyimpan data sementara:', err);
                }
            }, [dataLembur]);

            useEffect(() => {
                let cancelled = false;
                const autoLoadDatabase = async () => {
                    if (!window.XLSX) {
                        setDbLoadInfo('Excel engine belum siap. Refresh halaman jika perlu.');
                        return;
                    }
                    if (window.location.protocol === 'file:') {
                        setDbLoadInfo('Auto DB sefolder membutuhkan buka via localhost/server. Mode file:// dibatasi browser; pakai tombol Update DB.');
                        return;
                    }
                    for (const filename of AUTO_DB_FILENAMES) {
                        try {
                            const response = await fetch(filename, { cache: 'no-store' });
                            if (!response.ok) continue;
                            const buffer = await response.arrayBuffer();
                            const wb = window.XLSX.read(buffer, { type: 'array' });
                            const parsed = parseDatabaseWorkbook(wb);
                            if (parsed.length > 0) {
                                if (cancelled) return;
                                setDbKaryawan(parsed);
                                localStorage.setItem('dbKaryawan_v2', JSON.stringify(parsed));
                                setDbLoadInfo(`DB otomatis: ${filename} (${parsed.length} karyawan)`);
                                return;
                            }
                        } catch (err) {
                            console.warn(`Gagal auto-load DB ${filename}:`, err);
                        }
                    }
                    if (!cancelled) {
                        setDbLoadInfo('DB otomatis belum ditemukan di folder HTML. Nama yang dicari: database.xlsx / db_karyawan.xlsx / DB.xlsx / karyawan.xlsx.');
                    }
                };
                autoLoadDatabase();
                return () => { cancelled = true; };
            }, []);

            useEffect(() => {
                const day = new Date(inputDate).getDay();
                setIsHoliday(day === 0 || day === 6);
            }, [inputDate]);

            // Calculate DB Stats
            const dbStats = useMemo(() => {
                return {
                    total: dbKaryawan.length,
                    worker: dbKaryawan.filter(k => k.status?.toLowerCase() === 'worker').length,
                    staff: dbKaryawan.filter(k => k.status?.toLowerCase() === 'staff').length
                };
            }, [dbKaryawan]);

            // Helper Overtime Code
            const getOvertimeCode = buildOvertimeCode;

            // Init Modal State
            useEffect(() => {
                if (showDbModal) {
                    setBatchJam('');
                    setBatchPinjam(''); 
                    setBatchShift('Pagi');
                    setSelectedDbIds(new Set());
                    setViewSelectedOnly(false); // Reset view filter
                }
            }, [showDbModal]);

            // ACTIONS
            const checkDuplicate = (id) => {
                const inReport = dataLembur.some(i => String(i.karyawanId) === String(id) && i.tanggal === inputDate);
                const inQueue = queueLembur.some(i => String(i.karyawanId) === String(id));
                return inReport || inQueue;
            };

            const handleOpenModal = () => {
                if (!namaPenginput || namaPenginput.trim() === '') {
                    showAlert('Mohon isi Nama Penginput di bagian atas halaman terlebih dahulu sebelum melanjutkan.', {
                        title: 'Nama Penginput Wajib',
                        type: 'warning',
                        confirmText: 'Isi Sekarang'
                    }).then(focusPenginput);
                    return;
                }
                setShowDbModal(true);
            };

            const handleResetData = async () => {
                const ok = await showConfirm('Semua data lembur di layar dan antrian akan dihapus. Data yang sudah di-export tidak ikut terhapus. Lanjutkan?', {
                    title: 'Reset Data Lembur?',
                    type: 'danger',
                    confirmText: 'Ya, Reset',
                    cancelText: 'Batal'
                });
                if (!ok) return;
                setDataLembur([]); 
                setQueueLembur([]);
                localStorage.removeItem('dataLembur_temp');
                showToast('Data berhasil di-reset.', 'success');
            };

            const handleEditClick = (item) => {
                let isHol = false;
                const day = new Date(item.tanggal).getDay();
                if (day === 0 || day === 6) isHol = true;
                if (item.status === 'Worker' && item.kode.startsWith('L')) isHol = true;
                setEditingItem({ ...item, _isHoliday: isHol });
            };

            const handleSaveEdit = () => {
                if (!editingItem.jam) return showAlert('Jam lembur tidak boleh kosong.', { title: 'Input Belum Lengkap', type: 'warning' });
                
                const newCode = getOvertimeCode(editingItem.jam, editingItem.status, editingItem._isHoliday);

                const updated = dataLembur.map(i => i.id === editingItem.id ? { 
                    ...i, 
                    jam: editingItem.jam, 
                    kode: newCode, 
                    pinjam: editingItem.pinjam, 
                    shift: editingItem.shift 
                } : i);
                setDataLembur(updated);
                setEditingItem(null);
                showToast('Data berhasil diupdate.', 'success');
            };

            const handleBatchSubmit = () => {
                if (batchSubmitLockRef.current) return;
                batchSubmitLockRef.current = true;
                setTimeout(() => { batchSubmitLockRef.current = false; }, 150);

                const jamValid = normalizeJam(batchJam);
                if (selectedDbIds.size === 0) {
                    showAlert('Pilih minimal 1 karyawan terlebih dahulu.', { title: 'Belum Ada Karyawan', type: 'warning' });
                    return;
                }
                if (!jamValid) {
                    showAlert('Mohon isi Jam Lembur dengan angka lebih dari 0.', { title: 'Jam Tidak Valid', type: 'warning', confirmText: 'Perbaiki Jam' });
                    if (batchJamInputRef.current) batchJamInputRef.current.focus();
                    return;
                }

                const sel = dbKaryawan.filter(k => selectedDbIds.has(k.id));
                const existingKeys = new Set([
                    ...dataLembur
                        .filter(i => i.tanggal === inputDate)
                        .map(i => String(i.karyawanId)),
                    ...queueLembur.map(i => String(i.karyawanId))
                ]);
                const newQ = [];
                let dupCount = 0;

                sel.forEach(k => {
                    const id = String(k.id);
                    if (existingKeys.has(id)) {
                        dupCount++;
                        return;
                    }
                    existingKeys.add(id);
                    newQ.push({
                        tempId: generateUniqueId(),
                        karyawanId: k.id,
                        nama: k.nama,
                        section: k.section || '-',
                        status: normalizeStatus(k.status),
                        jam: jamValid,
                        kode: getOvertimeCode(jamValid, k.status, isHoliday),
                        pinjam: batchPinjam || '-',
                        shift: isHoliday ? batchShift : ''
                    });
                });

                if (newQ.length > 0) {
                    setQueueLembur(prev => [...newQ, ...prev]);
                    showToast(`${newQ.length} data ditambahkan ke antrian.`, 'success');
                }
                if (dupCount > 0) {
                    showAlert(`${dupCount} karyawan sudah ada di laporan/antrian dan dilewati.`, { title: 'Data Duplikat Dilewati', type: 'info' });
                }

                setSearchDb('');
                setSelectedDbIds(new Set());
                if (searchInputRef.current) searchInputRef.current.focus();
            };

            const handleSaveAllQueue = () => {
                if (queueLembur.length === 0) return;
                const newEntries = queueLembur.map(i => ({
                    id: generateUniqueId(),
                    tanggal: inputDate,
                    penginput: namaPenginput || '-',
                    ...i
                }));
                setDataLembur([...newEntries, ...dataLembur]);
                setQueueLembur([]);
                showToast('Data berhasil disimpan ke Laporan.', 'success');
            };

            // EXCEL & DB IMPORTS
            const handleDownloadTemplate = () => {
                if (!window.XLSX) return showAlert('Sistem Excel belum siap. Coba refresh halaman.', { title: 'Excel Belum Siap', type: 'warning' });
                const wb = window.XLSX.utils.book_new();
                const ws = window.XLSX.utils.aoa_to_sheet([
                    ["ID", "Nama", "Section", "Status"],
                    ["123", "Contoh", "IT", "Staff"]
                ]);
                window.XLSX.utils.book_append_sheet(wb, ws, "DB");
                window.XLSX.writeFile(wb, "database.xlsx");
                showToast('Template database.xlsx berhasil dibuat.', 'success');
            };

            const handleImportDatabase = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (!window.XLSX) {
                    showAlert('Sistem Excel belum siap. Coba refresh halaman.', { title: 'Excel Belum Siap', type: 'warning' });
                    e.target.value = '';
                    return;
                }
                try {
                    const wb = await readWorkbookFromFile(file);
                    const newDb = parseDatabaseWorkbook(wb);
                    if (!newDb.length) {
                        showAlert('Tidak ada data karyawan valid. Pastikan kolom minimal: ID dan Nama.', { title: 'Database Tidak Valid', type: 'warning' });
                        return;
                    }
                    setDbKaryawan(newDb);
                    localStorage.setItem('dbKaryawan_v2', JSON.stringify(newDb));
                    setDbLoadInfo(`DB aktif: ${newDb.length} karyawan dari ${file.name}`);
                    showToast(`Database diperbarui: ${newDb.length} karyawan.`, 'success');
                } catch (err) {
                    console.error(err);
                    showAlert('Gagal membaca database. Pastikan format Excel/CSV benar.', { title: 'Import Database Gagal', type: 'danger' });
                } finally {
                    e.target.value = '';
                }
            };

            const handleExportLaporan = () => {
                if (!window.XLSX) return showAlert('Sistem Excel belum siap. Coba refresh halaman.', { title: 'Excel Belum Siap', type: 'warning' });
                if (!filteredReportData.length) return showAlert('Tidak ada data untuk diexport pada tanggal/filter ini.', { title: 'Data Kosong', type: 'warning' });
                const ws = window.XLSX.utils.json_to_sheet(filteredReportData.map(r => ({
                    "Tanggal": r.tanggal,
                    "Inputter": r.penginput,
                    "ID": r.karyawanId,
                    "Nama": r.nama,
                    "Section": r.section,
                    "Status": r.status,
                    "Jam": r.jam,
                    "Kode": r.kode,
                    "Pinjam": r.pinjam,
                    "Shift": r.shift
                })));
                const wb = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                window.XLSX.writeFile(wb, `Lembur_${inputDate}.xlsx`);
                showToast('File laporan berhasil didownload.', 'success');
            };

            const handleImportLaporan = async (e) => {
                const file = e.target.files && e.target.files[0];
                if (!file) return;
                if (!window.XLSX) {
                    showAlert('Sistem Excel belum siap. Coba refresh halaman.', { title: 'Excel Belum Siap', type: 'warning' });
                    e.target.value = '';
                    return;
                }
                try {
                    const wb = await readWorkbookFromFile(file);
                    const imported = parseReportWorkbook(wb, inputDate);
                    if (!imported.length) {
                        showAlert('Tidak ada data lembur valid di file. Gunakan file hasil Download Excel aplikasi ini.', { title: 'File Tidak Valid', type: 'warning' });
                        return;
                    }
                    const existing = new Set(dataLembur.map(makeReportKey));
                    const unique = imported.filter(item => {
                        const key = makeReportKey(item);
                        if (existing.has(key)) return false;
                        existing.add(key);
                        return true;
                    });
                    if (!unique.length) {
                        showAlert('Semua data di file sudah ada, tidak ada yang ditambahkan.', { title: 'Tidak Ada Data Baru', type: 'info' });
                        return;
                    }
                    setDataLembur(prev => [...unique, ...prev]);
                    showToast(`Import Data berhasil: ${unique.length} data ditambahkan.`, 'success');
                } catch (err) {
                    console.error(err);
                    showAlert('Gagal import data lembur. Pastikan file adalah hasil export aplikasi ini.', { title: 'Import Data Gagal', type: 'danger' });
                } finally {
                    e.target.value = '';
                }
            };

            const handleClearQueue = async () => {
                const ok = await showConfirm('Hapus semua data yang masih ada di antrian?', {
                    title: 'Reset Antrian?',
                    type: 'warning',
                    confirmText: 'Ya, Kosongkan',
                    cancelText: 'Batal'
                });
                if (!ok) return;
                setQueueLembur([]);
                showToast('Antrian berhasil dikosongkan.', 'success');
            };

            const handleDeleteReportItem = async (item) => {
                const ok = await showConfirm(`Hapus data lembur ${item.nama}?`, {
                    title: 'Hapus Data?',
                    type: 'danger',
                    confirmText: 'Ya, Hapus',
                    cancelText: 'Batal'
                });
                if (!ok) return;
                setDataLembur(prev => prev.filter(x => x.id !== item.id));
                showToast('Data berhasil dihapus.', 'success');
            };

            // FILTERS & VIEW
            const filteredDb = useMemo(() => dbKaryawan.filter(i => {
                const query = searchDb.toLowerCase();
                return (normalizeText(i.nama).toLowerCase().includes(query) || normalizeText(i.id).includes(searchDb)) &&
                (filterSection === 'All' || normalizeText(i.section) === filterSection);
            }), [dbKaryawan, searchDb, filterSection]);

            // LIST TO DISPLAY (Based on view mode)
            const displayList = useMemo(() => {
                if (viewSelectedOnly) {
                    return dbKaryawan.filter(k => selectedDbIds.has(k.id));
                }
                return filteredDb;
            }, [viewSelectedOnly, dbKaryawan, selectedDbIds, filteredDb]);

            const uniqueSections = useMemo(() => ['All', ...new Set(dbKaryawan.map(k => normalizeText(k.section) || '-'))], [dbKaryawan]);
            const uniqueReportSections = useMemo(() => ['All', ...new Set(dataLembur.map(i => normalizeText(i.section) || '-'))], [dataLembur]);

            const filteredReportData = useMemo(() => dataLembur.filter(i => {
                const query = searchReport.toLowerCase();
                return i.tanggal === inputDate &&
                (normalizeText(i.nama).toLowerCase().includes(query) || normalizeText(i.karyawanId).includes(searchReport)) &&
                (filterReportSection === 'All' || normalizeText(i.section) === filterReportSection);
            }), [dataLembur, searchReport, filterReportSection, inputDate]);

            // Calculate Report Stats
            const reportStats = useMemo(() => {
                return {
                    worker: filteredReportData.filter(i => i.status?.toLowerCase() === 'worker').length,
                    staff: filteredReportData.filter(i => i.status?.toLowerCase() === 'staff').length
                };
            }, [filteredReportData]);

            // HELPER UI
            const getCodeColor = (code) => {
                const safeCode = normalizeText(code);
                if (!safeCode) return 'bg-gray-100';
                if (isHoliday) return 'bg-red-50 text-red-600 border-red-200';
                return safeCode.startsWith('L') ? 'bg-red-50 text-red-600 border-red-200' : 'bg-blue-50 text-blue-600 border-blue-200';
            };

            // KEYDOWN HANDLERS
            const handleSearchKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    if (displayList.length > 0) {
                        const firstId = displayList[0].id;
                        // Select top result
                        setSelectedDbIds(prev => {
                            const newSet = new Set(prev);
                            newSet.add(firstId);
                            return newSet;
                        });
                        
                        // Clear search input but KEEP focus there
                        setSearchDb('');
                    }
                }
            };

            const handleBatchJamKeyDown = (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    handleBatchSubmit();
                }
            };

            const toggleSelectAll = () => {
                if (displayList.length === 0) return;
                const allDisplayedSelected = displayList.every(k => selectedDbIds.has(k.id));
                const newSet = new Set(selectedDbIds);
                if (allDisplayedSelected) displayList.forEach(k => newSet.delete(k.id));
                else displayList.forEach(k => newSet.add(k.id));
                setSelectedDbIds(newSet);
            };

            const toggleSelection = (id) => {
                const newSet = new Set(selectedDbIds);
                if (newSet.has(id)) newSet.delete(id);
                else newSet.add(id);
                setSelectedDbIds(newSet);
            };

            const dialogStyle = dialog ? (FEEDBACK_STYLES[dialog.type] || FEEDBACK_STYLES.info) : FEEDBACK_STYLES.info;
            const toastStyle = toast ? (FEEDBACK_STYLES[toast.type] || FEEDBACK_STYLES.info) : FEEDBACK_STYLES.info;

            return (
                <div className="min-h-screen bg-slate-100 p-3 md:p-6 font-sans relative">
                    
                    {/* --- MODERN MESSAGE BOX / CONFIRMATION --- */}
                    {dialog && (
                        <div className="fixed inset-0 bg-slate-950/55 backdrop-blur-sm z-[80] flex items-center justify-center p-4 modern-fade" onMouseDown={() => closeDialog(false)}>
                            <div className={`bg-white rounded-2xl shadow-2xl w-full max-w-md border ${dialogStyle.border} overflow-hidden modern-pop`} onMouseDown={(e) => e.stopPropagation()}>
                                <div className="p-6 text-center">
                                    <div className={`mx-auto mb-4 w-16 h-16 rounded-2xl ${dialogStyle.iconBg} ${dialogStyle.iconText} ring-8 ${dialogStyle.ring} flex items-center justify-center`}>
                                        {dialog.type === 'danger' ? <Icons.Trash2 size={30}/> : dialog.type === 'success' ? <Icons.CheckSquare size={30}/> : <Icons.AlertCircle size={30}/>} 
                                    </div>
                                    <h3 className="text-xl font-extrabold text-slate-800 mb-2">{dialog.title}</h3>
                                    <p className="text-sm text-slate-500 leading-relaxed whitespace-pre-line">{dialog.message}</p>
                                </div>
                                <div className="bg-slate-50 px-6 py-4 flex gap-3 justify-end border-t border-slate-100">
                                    {dialog.mode === 'confirm' && (
                                        <button onClick={() => closeDialog(false)} className="px-4 py-2.5 rounded-xl text-sm font-bold text-slate-600 bg-white border border-slate-200 hover:bg-slate-100 transition">
                                            {dialog.cancelText || 'Batal'}
                                        </button>
                                    )}
                                    <button onClick={() => closeDialog(true)} className={`px-4 py-2.5 rounded-xl text-sm font-bold text-white shadow-sm transition ${dialogStyle.button}`} autoFocus>
                                        {dialog.confirmText || 'OK'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL EDIT --- */}
                    {editingItem && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md">
                                <div className="p-4 border-b bg-slate-50 rounded-t-xl flex justify-between items-center">
                                    <h3 className="font-bold text-slate-700 flex items-center gap-2"><Icons.Edit3 size={18}/> Edit Data</h3>
                                    <button onClick={() => setEditingItem(null)} className="text-slate-400 hover:text-red-500"><Icons.X size={20}/></button>
                                </div>
                                <div className="p-5 space-y-4">
                                    <div className="bg-slate-50 p-3 rounded border text-sm space-y-1">
                                        <div className="flex justify-between"><span>Nama:</span> <b>{editingItem.nama}</b></div>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="text-xs font-bold text-slate-500 uppercase">Jam</label>
                                            <input type="number" step="0.5" className="w-full mt-1 px-3 py-2 border rounded-lg font-bold text-center" 
                                                value={editingItem.jam} onChange={(e) => setEditingItem({...editingItem, jam: e.target.value})} />
                                        </div>
                                        {/* EDIT SHIFT */}
                                        {editingItem._isHoliday && (
                                            <div>
                                                <label className="text-xs font-bold text-slate-500 uppercase">Shift</label>
                                                <select 
                                                    className="w-full mt-1 px-3 py-2 border rounded-lg text-sm bg-white"
                                                    value={editingItem.shift} 
                                                    onChange={(e) => setEditingItem({...editingItem, shift: e.target.value})}
                                                >
                                                    <option value="Pagi">Pagi</option>
                                                    <option value="Siang">Siang</option>
                                                    <option value="Normal">Normal</option>
                                                </select>
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex items-center gap-3 bg-blue-50 p-3 rounded border border-blue-100">
                                        <div className="text-sm font-bold text-blue-800">Kode Baru: {getOvertimeCode(editingItem.jam, editingItem.status, editingItem._isHoliday)}</div>
                                        <label className="flex items-center gap-2 text-xs cursor-pointer ml-auto">
                                            <input type="checkbox" checked={editingItem._isHoliday} onChange={(e) => setEditingItem({...editingItem, _isHoliday: e.target.checked})} />
                                            <span>Hitung Libur?</span>
                                        </label>
                                    </div>
                                    <div>
                                        <label className="text-xs font-bold text-slate-500 uppercase">Pinjam</label>
                                        <input type="text" className="w-full mt-1 px-3 py-2 border rounded-lg text-sm" 
                                            value={editingItem.pinjam} onChange={(e) => setEditingItem({...editingItem, pinjam: e.target.value})} />
                                    </div>
                                </div>
                                <div className="p-4 border-t bg-slate-50 flex justify-end gap-2 rounded-b-xl">
                                    <button onClick={() => setEditingItem(null)} className="px-4 py-2 text-sm text-slate-600 hover:bg-slate-200 rounded-lg">Batal</button>
                                    <button onClick={handleSaveEdit} className="px-4 py-2 text-sm bg-blue-600 text-white hover:bg-blue-700 rounded-lg font-bold">Simpan</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- MODAL SEARCH (BATCH INPUT) --- */}
                    {showDbModal && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] flex flex-col">
                                <div className="p-4 border-b flex justify-between items-center bg-slate-50 rounded-t-xl">
                                    <h3 className="font-bold text-slate-700 flex items-center gap-2"><Icons.List size={20}/> Cari Karyawan</h3>
                                    <button onClick={() => setShowDbModal(false)} className="text-slate-400 hover:text-red-500"><Icons.X size={24}/></button>
                                </div>
                                <div className="p-4 space-y-3 bg-white border-b">
                                    <div className="flex gap-3 items-center">
                                        <div className="relative flex-1">
                                            <Icons.Search className="absolute left-3 top-2.5 text-slate-400" size={18} />
                                            {/* INPUT PENCARIAN UTAMA */}
                                            <input 
                                                ref={searchInputRef}
                                                type="text" 
                                                placeholder="Cari Nama/ID... (Tekan Enter untuk pilih)" 
                                                className="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" 
                                                value={searchDb} 
                                                onChange={e => setSearchDb(e.target.value)} 
                                                onKeyDown={handleSearchKeyDown} // Handle Enter
                                                autoFocus 
                                            />
                                        </div>
                                        <select className="border p-2 rounded-lg text-sm" value={filterSection} onChange={e => setFilterSection(e.target.value)}>
                                            {uniqueSections.map(s => <option key={s} value={s}>{s}</option>)}
                                        </select>
                                    </div>
                                    
                                    {/* TOGGLE LIHAT TERPILIH */}
                                    <div className="flex justify-end">
                                        <button 
                                            onClick={() => setViewSelectedOnly(!viewSelectedOnly)}
                                            className={`text-xs px-3 py-1.5 rounded-full border transition flex items-center gap-2 font-medium
                                                ${viewSelectedOnly ? 'bg-blue-100 border-blue-300 text-blue-700' : 'bg-white border-slate-300 text-slate-500 hover:bg-slate-50'}`}
                                        >
                                            {viewSelectedOnly ? <Icons.Check size={14}/> : <Icons.List size={14}/>}
                                            {viewSelectedOnly ? 'Tampilkan Semua' : `Lihat Terpilih (${selectedDbIds.size})`}
                                        </button>
                                    </div>
                                </div>
                                <div className="overflow-y-auto flex-1">
                                    <table className="w-full text-sm text-left">
                                        <thead className="bg-slate-100 sticky top-0">
                                            <tr>
                                                <th className="p-3 w-10 text-center"><button onClick={toggleSelectAll}><Icons.CheckSquare size={18}/></button></th>
                                                <th className="p-3">ID</th><th className="p-3">Nama</th><th className="p-3">Section</th><th className="p-3">Status</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y">
                                            {displayList.map((k, idx) => (
                                                <tr key={k.id || idx} className={`cursor-pointer ${selectedDbIds.has(k.id) ? 'bg-blue-50' : 'hover:bg-slate-50'}`} 
                                                    onClick={() => toggleSelection(k.id)}>
                                                    <td className="p-3 text-center">{selectedDbIds.has(k.id) ? <Icons.CheckSquare size={18} className="text-blue-600"/> : <Icons.Square size={18} className="text-slate-300"/>}</td>
                                                    <td className="p-3 font-mono">{k.id}</td><td className="p-3">{k.nama}</td><td className="p-3">{k.section}</td>
                                                    <td className="p-3"><span className="text-xs px-2 py-1 rounded border bg-slate-50">{k.status}</span></td>
                                                </tr>
                                            ))}
                                            {displayList.length === 0 && <tr><td colSpan="5" className="p-8 text-center text-slate-400">Tidak ada data ditampilkan.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                                
                                {/* INPUT BATCH PANEL */}
                                <div className="p-4 border-t bg-slate-50">
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                                        <span className="text-xs font-bold text-slate-500">{selectedDbIds.size} Karyawan Terpilih</span>
                                        <div className="flex flex-wrap items-center gap-2 w-full md:w-auto">
                                            <div className="flex items-center bg-white border rounded-lg px-2 shadow-sm focus-within:ring-2 focus-within:ring-blue-500">
                                                <span className="text-xs font-bold text-slate-400 mr-1">Jam:</span>
                                                {/* INPUT JAM */}
                                                <input 
                                                    ref={batchJamInputRef}
                                                    type="number" step="0.5" 
                                                    className="w-16 p-2 text-center font-bold outline-none" 
                                                    value={batchJam} 
                                                    onChange={e => setBatchJam(e.target.value)}
                                                    onKeyDown={handleBatchJamKeyDown} // Handle Enter
                                                />
                                            </div>
                                            
                                            {isHoliday && (
                                                <div className="flex items-center bg-white border rounded-lg px-2">
                                                    <span className="text-xs font-bold text-slate-400 mr-1">Shift:</span>
                                                    <select className="p-2 text-sm bg-white outline-none" value={batchShift} onChange={e => setBatchShift(e.target.value)}>
                                                        <option value="Pagi">Pagi</option>
                                                        <option value="Siang">Siang</option>
                                                        <option value="Normal">Normal</option>
                                                    </select>
                                                </div>
                                            )}
                                            
                                            <input type="text" placeholder="Pinjam..." className="w-32 p-2 border rounded-lg text-sm" value={batchPinjam} onChange={e => setBatchPinjam(e.target.value)}/>
                                            
                                            <button onClick={handleBatchSubmit} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-1 shadow-sm transition">
                                                <Icons.Plus size={16}/> Tambahkan
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- HEADER --- */}
                    <div className="bg-white rounded-xl shadow-sm p-4 border-l-4 border-blue-600 mb-6">
                        <div className="flex flex-col md:flex-row justify-between items-start gap-4 mb-4 border-b border-slate-100 pb-4">
                            <div className="flex items-center gap-4">
                                <img src={APP_LOGO} alt="Logo Hop Lun" className="w-12 h-12 rounded-lg object-cover shadow-sm border border-pink-100 shrink-0"/>
                                <div><h1 className="text-2xl font-bold text-slate-800">PT Hop Lun Indonesia</h1><p className="text-slate-500 text-sm">Input Lembur Karyawan</p></div>
                            </div>
                            <div className="flex flex-col md:flex-row gap-3 items-end">
                                <button onClick={handleResetData} className="flex items-center gap-2 px-3 py-1.5 bg-red-50 text-red-600 border border-red-200 rounded-lg text-xs font-bold transition hover:bg-red-100"><Icons.RotateCcw size={14}/> Reset</button>
                                <div className="flex flex-col items-end">
                                    <label className="text-[10px] uppercase font-bold text-slate-400">Penginput</label>
                                    <div className="relative w-48"><Icons.User className="absolute left-2 top-2 text-slate-400" size={14}/><input id="inputNamaPenginput" type="text" className="w-full pl-7 pr-2 py-1 border rounded text-sm focus:ring-2 focus:ring-blue-500 outline-none" value={namaPenginput} onChange={e => setNamaPenginput(e.target.value)} placeholder="Nama Anda"/></div>
                                </div>
                            </div>
                        </div>
                        <div className="flex flex-col md:flex-row justify-between items-end gap-4">
                            <div className="flex flex-wrap gap-4 items-center bg-slate-50 p-2 rounded-lg border border-slate-200">
                                <div>
                                    <label className="text-[10px] font-bold text-slate-500 uppercase">Tanggal</label>
                                    <div className="flex items-center gap-2 bg-white border rounded px-2 py-1"><Icons.Calendar size={16} className="text-blue-600"/><input type="date" value={inputDate} onChange={e => setInputDate(e.target.value)} className="outline-none text-sm bg-transparent"/></div>
                                </div>
                                <label className="flex items-center gap-2 cursor-pointer pb-1 select-none">
                                    <input type="checkbox" checked={isHoliday} onChange={e => setIsHoliday(e.target.checked)} className="w-4 h-4 accent-red-500"/>
                                    <span className={`text-sm font-bold ${isHoliday ? 'text-red-600' : 'text-slate-600'}`}>Libur/Sabtu</span>
                                </label>
                                
                                <div className="h-8 w-px bg-slate-300 mx-2 hidden md:block"></div>
                                
                                <div className="flex gap-3 text-xs">
                                    <div><div className="font-bold text-slate-400 uppercase text-[10px]">Total DB</div><div className="font-bold text-slate-700">{dbStats.total}</div></div>
                                    <div><div className="font-bold text-slate-400 uppercase text-[10px]">Worker</div><div className="font-bold text-orange-600">{dbStats.worker}</div></div>
                                    <div><div className="font-bold text-slate-400 uppercase text-[10px]">Staff</div><div className="font-bold text-purple-600">{dbStats.staff}</div></div>
                                    <div className="basis-full text-[10px] text-slate-500 flex items-center gap-1 pt-1">
                                        <Icons.Database size={12}/> <span className="truncate max-w-[520px]" title={dbLoadInfo}>{dbLoadInfo}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="flex items-center gap-2">
                                <button onClick={handleDownloadTemplate} className="text-xs text-blue-600 hover:underline flex items-center gap-1"><Icons.FileSpreadsheet size={12}/> Template</button>
                                <label htmlFor="db-upload" className="cursor-pointer bg-slate-700 text-white text-xs py-2 px-3 rounded flex items-center gap-2 hover:bg-slate-800 transition shadow-sm"><Icons.Upload size={14}/> Update DB</label>
                                <input id="db-upload" type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleImportDatabase}/>
                            </div>
                        </div>
                    </div>

                    {/* --- CONTENT --- */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        
                        {/* ANTRIAN (KIRI) */}
                        <div className="space-y-4">
                            
                            {/* TOMBOL CARI BESAR */}
                            <button 
                                onClick={handleOpenModal}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-xl shadow-md transition flex items-center justify-center gap-3 group relative overflow-hidden"
                            >
                                <div className="absolute top-0 right-0 p-2 opacity-10"><Icons.Search size={64}/></div>
                                <div className="bg-white/20 p-2 rounded-lg group-hover:scale-110 transition"><Icons.UserPlus size={24}/></div>
                                <div className="text-left">
                                    <div className="text-xs font-medium text-blue-100 uppercase">Cari Data Karyawan</div>
                                    <div className="text-lg font-bold">Klik Disini Untuk Memulai</div>
                                </div>
                            </button>

                            {/* TABEL ANTRIAN (NEW DESIGN) */}
                            <div className="bg-orange-50 rounded-xl shadow-sm p-5 border border-orange-200 h-[calc(100vh-320px)] flex flex-col">
                                <div className="flex justify-between mb-3 items-center border-b border-orange-200 pb-2">
                                    <h3 className="font-bold text-orange-800 text-sm flex gap-2 items-center"><Icons.List size={16}/> Antrian ({queueLembur.length})</h3>
                                    {queueLembur.length > 0 && <button onClick={handleClearQueue} className="text-xs text-orange-600 hover:text-red-600 underline">Reset Semua</button>}
                                </div>
                                
                                {/* Tabel Antrian Menggantikan Card */}
                                <div className="flex-1 overflow-y-auto pr-1">
                                    {queueLembur.length === 0 ? (
                                        <div className="h-full flex flex-col items-center justify-center text-slate-400 text-xs italic gap-2 opacity-60">
                                            <Icons.List size={32}/>
                                            <p>Belum ada data di antrian.</p>
                                            <p>Klik tombol biru di atas untuk mulai.</p>
                                        </div>
                                    ) : (
                                        <table className="w-full text-xs text-left">
                                            <thead className="text-orange-800 border-b border-orange-200 font-bold">
                                                <tr>
                                                    <th className="py-2">Nama</th>
                                                    <th className="py-2 text-center">Jam</th>
                                                    <th className="py-2 text-center">Kode</th>
                                                    {isHoliday && <th className="py-2 text-center">Shift</th>}
                                                    <th className="py-2 text-right">#</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-orange-200/50">
                                                {queueLembur.map(i => (
                                                    <tr key={i.tempId} className="group hover:bg-orange-100/50 transition">
                                                        <td className="py-2">
                                                            <div className="font-bold text-slate-700">{i.nama}</div>
                                                            <div className="text-[10px] text-slate-500">{i.section}</div>
                                                            {i.pinjam && i.pinjam !== '-' && <div className="text-[9px] text-orange-600 italic">P: {i.pinjam}</div>}
                                                        </td>
                                                        <td className="py-2 text-center font-bold text-slate-600">{i.jam}</td>
                                                        <td className="py-2 text-center">
                                                            <span className={`px-1.5 py-0.5 rounded border ${getCodeColor(i.kode)}`}>{i.kode}</span>
                                                        </td>
                                                        {isHoliday && (
                                                            <td className="py-2 text-center">
                                                                <span className="text-[10px] bg-white border border-orange-200 px-1 rounded">{i.shift}</span>
                                                            </td>
                                                        )}
                                                        <td className="py-2 text-right">
                                                            <button onClick={() => setQueueLembur(queueLembur.filter(q => q.tempId !== i.tempId))} className="text-slate-400 hover:text-red-500"><Icons.X size={14}/></button>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    )}
                                </div>
                                
                                <div className="pt-4 mt-2 border-t border-orange-200">
                                    <button onClick={handleSaveAllQueue} disabled={queueLembur.length === 0} className={`w-full py-3 rounded-lg font-bold text-sm shadow-sm transition flex justify-center gap-2 ${queueLembur.length > 0 ? 'bg-orange-600 hover:bg-orange-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}`}>
                                        <Icons.Save size={18}/> SIMPAN KE LAPORAN
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* LAPORAN (KANAN) */}
                        <div className="lg:col-span-2 bg-white rounded-xl shadow-sm p-6 border border-slate-200 h-full flex flex-col">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                                <h2 className="font-bold text-slate-700 flex items-center gap-2 text-lg">
                                    <Icons.FileText size={24} className="text-green-600"/> 
                                    Data Lembur Karyawan <span className="text-slate-400 text-sm font-normal hidden md:inline">| {new Date(inputDate).toLocaleDateString('id-ID', { dateStyle: 'long' })}</span>
                                </h2>
                                
                                <div className="flex flex-col md:flex-row gap-3 items-end md:items-center w-full md:w-auto">
                                    {/* Stats Report */}
                                    <div className="flex gap-3 text-xs bg-slate-50 px-3 py-1.5 rounded border border-slate-100">
                                         <div className="flex items-center gap-1"><span className="text-slate-400">Worker:</span><span className="font-bold text-slate-700">{reportStats.worker}</span></div>
                                         <div className="w-px h-4 bg-slate-200"></div>
                                         <div className="flex items-center gap-1"><span className="text-slate-400">Staff:</span><span className="font-bold text-slate-700">{reportStats.staff}</span></div>
                                    </div>

                                    <div className="flex gap-2">
                                        <label htmlFor="laporan-import" className="cursor-pointer text-sm bg-blue-600 hover:bg-blue-700 text-white py-1.5 px-4 rounded-lg gap-2 flex transition shadow-sm font-medium">
                                            <Icons.Upload size={16}/> Import Data
                                        </label>
                                        <input id="laporan-import" type="file" className="hidden" accept=".xlsx,.xls,.csv" onChange={handleImportLaporan}/>
                                        <button onClick={handleExportLaporan} className="text-sm bg-green-600 hover:bg-green-700 text-white py-1.5 px-4 rounded-lg gap-2 flex transition shadow-sm font-medium"><Icons.Download size={16}/> Download Excel</button>
                                    </div>
                                </div>
                            </div>
                            
                            <div className="flex gap-3 mb-4 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                <div className="relative flex-1">
                                    <Icons.Search className="absolute left-3 top-2.5 text-slate-400" size={16} />
                                    <input type="text" placeholder="Cari di laporan ini..." className="w-full pl-9 pr-4 py-2 border rounded-md text-sm focus:ring-2 focus:ring-green-500 outline-none" value={searchReport} onChange={e => setSearchReport(e.target.value)} />
                                </div>
                                <div className="relative">
                                    <Icons.Filter className="absolute left-3 top-2.5 text-slate-400" size={16} />
                                    <select className="pl-9 pr-8 py-2 border rounded-md text-sm bg-white outline-none focus:ring-2 focus:ring-green-500" value={filterReportSection} onChange={e => setFilterReportSection(e.target.value)}>
                                        {uniqueReportSections.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                            </div>

                            <div className="overflow-auto flex-1 border rounded-lg">
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-slate-50 text-slate-600 border-b sticky top-0 z-10">
                                        <tr>
                                            <th className="p-3">Nama & ID</th>
                                            <th className="p-3">Info</th>
                                            <th className="p-3 text-center">Jam</th>
                                            {isHoliday && <th className="p-3 text-center bg-yellow-50 text-yellow-700">Shift</th>}
                                            <th className="p-3 text-center">Kode</th>
                                            <th className="p-3">Pinjam</th>
                                            <th className="p-3 text-center">User</th>
                                            <th className="p-3 text-center">#</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y">
                                        {filteredReportData.length === 0 ? <tr><td colSpan={isHoliday ? 8 : 7} className="p-10 text-center text-slate-400 italic">Data tidak ditemukan.</td></tr> : filteredReportData.map(i => (
                                            <tr key={i.id} className="hover:bg-slate-50 transition group">
                                                <td className="p-3">
                                                    <div className="font-bold text-slate-700">{i.nama}</div>
                                                    <div className="text-xs text-slate-400 font-mono">{i.karyawanId}</div>
                                                </td>
                                                <td className="p-3 text-xs text-slate-500">
                                                    <div className="font-medium">{i.section}</div>
                                                    <div className="text-[10px] uppercase tracking-wide">{i.status}</div>
                                                </td>
                                                <td className="p-3 text-center font-bold text-lg text-slate-700">{i.jam}</td>
                                                
                                                {/* SHIFT COLUMN */}
                                                {isHoliday && (
                                                    <td className="p-3 text-center bg-yellow-50/30">
                                                        <span className="text-[10px] uppercase font-bold text-yellow-700 border border-yellow-200 bg-white px-2 py-0.5 rounded">{i.shift || '-'}</span>
                                                    </td>
                                                )}

                                                <td className="p-3 text-center"><span className={`px-2 py-1 rounded border text-xs font-bold ${getCodeColor(i.kode)}`}>{i.kode}</span></td>
                                                <td className="p-3 text-xs text-slate-600 max-w-[120px] truncate" title={i.pinjam}>{i.pinjam}</td>
                                                <td className="p-3 text-center text-[10px] text-slate-400 italic">{i.penginput}</td>
                                                <td className="p-3 text-center">
                                                    <div className="flex items-center justify-center gap-1 opacity-50 group-hover:opacity-100 transition">
                                                        <button onClick={() => handleEditClick(i)} className="text-blue-500 hover:bg-blue-100 p-1.5 rounded"><Icons.Pencil size={16}/></button>
                                                        <button onClick={() => handleDeleteReportItem(i)} className="text-red-500 hover:bg-red-100 p-1.5 rounded"><Icons.Trash2 size={16}/></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                            
                            <div className="mt-4 pt-4 border-t border-slate-100 flex justify-between text-xs font-medium text-slate-500">
                                <span>Menampilkan {filteredReportData.length} data</span>
                                <div className="flex gap-4">
                                    <span className="bg-slate-100 px-2 py-1 rounded">Total Orang: <b className="text-slate-800">{filteredReportData.length}</b></span>
                                    <span className="bg-slate-100 px-2 py-1 rounded">Total Jam: <b className="text-slate-800">{filteredReportData.reduce((acc, curr) => acc + (parseFloat(normalizeText(curr.jam).replace(',', '.')) || 0), 0)}</b></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {toast && (
                        <div className={`fixed bottom-6 right-6 z-[90] text-white px-4 py-3 rounded-2xl shadow-2xl flex items-center gap-3 modern-slide ${toastStyle.toast}`}>
                            <div className="bg-white/20 rounded-xl p-1.5">
                                {toast.type === 'danger' ? <Icons.AlertCircle size={20}/> : toast.type === 'warning' ? <Icons.AlertCircle size={20}/> : <Icons.CheckSquare size={20}/>} 
                            </div>
                            <span className="font-semibold text-sm pr-2">{toast.message}</span>
                            <button onClick={() => setToast(null)} className="ml-1 rounded-lg p-1 hover:bg-white/20 transition" aria-label="Tutup notifikasi"><Icons.X size={16}/></button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
