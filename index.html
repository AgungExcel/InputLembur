<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Input Lembur Online - PT Hop Lun Indonesia</title>
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="config.js"></script>
  <style>
    ::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-track{background:#f1f5f9}::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:8px}::-webkit-scrollbar-thumb:hover{background:#94a3b8}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}@keyframes popIn{from{opacity:0;transform:translateY(14px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}@keyframes slideIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
    .fade-in{animation:fadeIn .18s ease-out}.pop-in{animation:popIn .22s cubic-bezier(.2,.9,.2,1)}.slide-in{animation:slideIn .22s ease-out}
    .glass{background:rgba(255,255,255,.92);backdrop-filter:blur(14px)}
  </style>
</head>
<body class="bg-slate-100 text-slate-800">
  <noscript><div style="padding:24px;font-family:Arial">Aplikasi membutuhkan JavaScript.</div></noscript>
  <div id="root">
    <div class="min-h-screen flex items-center justify-center p-6">
      <div class="bg-white rounded-3xl border border-slate-200 shadow-xl p-8 max-w-lg text-center">
        <img src="assets/logo-hoplun.jpg" alt="Logo" class="w-20 h-20 object-contain mx-auto rounded-2xl mb-4" />
        <h1 class="font-black text-xl text-slate-900">Memuat Aplikasi...</h1>
        <p class="text-sm text-slate-500 mt-2">Pastikan koneksi internet aktif agar library aplikasi bisa dimuat.</p>
      </div>
    </div>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="fixed bottom-5 right-5 z-[80] space-y-3"></div>
  <script src="app.js"></script>
</body>
</html>
